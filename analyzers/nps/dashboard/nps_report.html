  --text-primary: #1F2937;
  --text-secondary: #6B7280;
  --text-muted: #9CA3AF;
  --green: #059669;
  --green-bg: #ECFDF5;
  --red: #DC2626;

  --blue-bg: #EFF6FF;
  --chart-1: #7C3AED; --chart-2: #4F46E5; --chart-3: #2563EB;

}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--surface-0); color:var(--text-primary); }

/* HEADER */
.header {
  background: var(--pw-purple);
  padding: 24px 40px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display:flex; align-items:center; gap:16px; }
.logo {
  width:40px; height:40px; background:rgba(255,255,255,0.15); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:11px; color:#fff; letter-spacing:0.5px; line-height:1.1; text-align:center;
}
.header h1 { font-size:20px; font-weight:600; color:#fff; }
.header-sub { font-size:13px; color:rgba(255,255,255,0.65); }
.header-right { font-size:12px; color:rgba(255,255,255,0.5); font-family:'JetBrains Mono',monospace; }

/* NAV */
.nav {
  background: var(--surface-1); border-bottom:1px solid var(--border);
  padding: 0 40px; display:flex; gap:4px; overflow-x:auto;
}
.nav-btn {
  padding:12px 20px; font-size:13px; font-weight:500; color:var(--text-secondary);
  background:none; border:none; cursor:pointer; border-bottom:2px solid transparent;
  white-space:nowrap; transition: all 0.15s;
}
.nav-btn:hover { color:var(--text-primary); }
.nav-btn.active { color:var(--pw-purple); border-bottom-color:var(--pw-purple); font-weight:600; }

/* CONTENT */
.content { max-width:1200px; margin:0 auto; padding:32px 40px; }
.section { display:none; }
.section.active { display:block; }
.section-title { font-size:22px; font-weight:700; margin-bottom:4px; }
.section-subtitle { font-size:14px; color:var(--text-secondary); margin-bottom:24px; }

/* KPI ROW */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:16px; margin-bottom:28px; }
.kpi {
  background:var(--surface-1); border:1px solid var(--border); border-radius:10px;
  padding:20px; text-align:center;
}
.kpi-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-bottom:6px; }
.kpi-value { font-size:28px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.kpi-sub { font-size:12px; color:var(--text-secondary); margin-top:4px; }

.card {
  background:var(--surface-1); border:1px solid var(--border); border-radius:10px;
  padding:24px; margin-bottom:20px;
}
.card-title { font-size:15px; font-weight:600; margin-bottom:4px; }
.card-subtitle { font-size:12px; color:var(--text-secondary); margin-bottom:16px; }

.chart-grid .card { margin-bottom:0; }

/* TABLES */
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:10px 12px; font-weight:600; font-size:11px; text-transform:uppercase;
     letter-spacing:0.5px; color:var(--text-muted); border-bottom:2px solid var(--border); }
td { padding:10px 12px; border-bottom:1px solid var(--border); }
tr:hover { background:var(--surface-2); }
.mono { font-family:'JetBrains Mono',monospace; font-size:12px; }
.text-right { text-align:right; }

/* BADGES */
.badge {
  display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600;
}
.badge-red { background:var(--red-bg); color:var(--red); }
.badge-green { background:var(--green-bg); color:var(--green); }
.badge-amber { background:var(--amber-bg); color:var(--amber); }
.badge-blue { background:var(--blue-bg); color:var(--blue); }

/* STAT TEST */
.stat-badge {
  display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600;
  margin-left:8px;
}
.stat-sig { background:var(--green-bg); color:var(--green); }
.stat-ns { background:var(--surface-2); color:var(--text-muted); }

.dim-card { border:1px solid var(--border); border-radius:12px; margin-bottom:12px; overflow:hidden; background:var(--surface-1); }
.dim-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; cursor:pointer; transition:background 0.15s; }
.dim-header:hover { background:var(--surface-2); }
.dim-header-left { flex:1; }
.dim-title { font-weight:600; font-size:15px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.dim-narrative { font-size:13px; color:var(--text-secondary); margin-top:6px; line-height:1.5; }
.dim-toggle { font-size:20px; font-weight:700; color:var(--text-muted); padding-left:16px; user-select:none; min-width:24px; text-align:center; }
.dim-body { display:none; padding:0 20px 16px; border-top:1px solid var(--border); }
.dim-card.open .dim-body { display:block; padding-top:12px; }

/* RECOMMENDATION CARDS */
.rec-card {
  background:var(--surface-1); border:1px solid var(--border); border-radius:10px;
  padding:20px 24px; margin-bottom:16px; border-left:4px solid var(--pw-purple);

.rec-finding { font-size:13px; color:var(--text-secondary); margin-bottom:10px; }
.rec-action { font-size:13px; padding:12px; background:var(--surface-2); border-radius:6px; margin-bottom:8px; }
.rec-action strong { color:var(--pw-purple); }
.rec-impact { font-size:12px; color:var(--text-muted); font-style:italic; }

/* COMMENT */

function loadData() {
  if (!DATA) {
    document.getElementById('loadingMsg').innerHTML =
      '<strong>No data embedded.</strong><br><br>' +
      'Run the build script first:<br><code style="background:#eee;padding:4px 8px;border-radius:4px;">python -m analyzers.nps.run_analysis --dashboard</code>';
    return;
  }
  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('genTimestamp').textContent =
    'Generated: ' + new Date(DATA.metadata.generated_at).toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
  renderAll();
}

// ============================================================
// HELPERS
// ============================================================
function fmt(n) { return n == null ? '—' : '$' + Math.round(n).toLocaleString(); }
function fmtPct(n) { return n == null ? '—' : n.toFixed(1) + '%'; }
function fmtNum(n) { return n == null ? '—' : Math.round(n).toLocaleString(); }
function fmtDec(n, d=1) { return n == null ? '—' : n.toFixed(d); }
function scoreBadge(label) {
  if (label === 'detractor') return '<span class="badge badge-red">Detractor</span>';
  if (label === 'promoter') return '<span class="badge badge-green">Promoter</span>';
  return '<span class="badge badge-amber">Passive</span>';
}
function priorityBadge(p) {
  const cls = p === 'critical' ? 'badge-red' : p === 'high' ? 'badge-amber' : 'badge-blue';
  return `<span class="badge ${cls}">${p.toUpperCase()}</span>`;
}
function changeArrow(val) {
  if (val > 0) return `<span style="color:var(--green)">▲ +${val}</span>`;
  if (val < 0) return `<span style="color:var(--red)">▼ ${val}</span>`;
  return `<span style="color:var(--text-muted)">— 0</span>`;
}

function renderDiagnostic() {
  const d = DATA.diagnostic;
  const fy = d.report_fy;
  const narr = d.narratives || {};
  const mq = d.model_quality || {};

  // Feature narrative fuzzy lookup
  const featNarr = narr.feature_narratives || {};
  function getFeatureNarrative(featureName) {
    if (featNarr[featureName]) return featNarr[featureName];
    const lower = featureName.toLowerCase();
    for (const [k, v] of Object.entries(featNarr)) {
      if (k.toLowerCase() === lower || k.toLowerCase().includes(lower) || lower.includes(k.toLowerCase())) return v;
    }
    return '';
  }

  let html = `
    <h2 class="section-title">Why Did It Happen? — Layer 2: Diagnostic Analytics — FY${fy}</h2>
    <p class="section-subtitle">What customers told us and what the data shows across ${fmtNum(mq.n_samples)} survey responses.</p>`;

  // Overall synthesis
  if (narr.overall_synthesis) {
    html += `<div class="card" style="border-left:4px solid var(--pw-purple);">
      <div class="card-title">Diagnostic Synthesis</div>
      <p style="font-size:14px;color:var(--text-secondary);line-height:1.6;">${narr.overall_synthesis}</p>
    </div>`;
  }

  // Model quality KPIs
  html += `<div class="kpi-row">
    <div class="kpi">
      <div class="kpi-label">Model Accuracy</div>
      <div class="kpi-value" style="color:${mq.cv_accuracy > mq.baseline_accuracy ? 'var(--green)' : 'var(--amber)'}">${(mq.cv_accuracy * 100).toFixed(1)}%</div>
      <div class="kpi-sub">Baseline: ${(mq.baseline_accuracy * 100).toFixed(1)}%</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">F1 Score</div>
      <div class="kpi-value" style="color:${mq.cv_f1 > 0.4 ? 'var(--green)' : 'var(--amber)'}">${(mq.cv_f1 * 100).toFixed(1)}%</div>
      <div class="kpi-sub">Detractor detection</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Detractors</div>
      <div class="kpi-value" style="color:var(--red)">${fmtNum(mq.n_detractors)}</div>
      <div class="kpi-sub">${((mq.n_detractors / mq.n_samples) * 100).toFixed(1)}% of responses</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Key Finding</div>
      <div class="kpi-value" style="font-size:16px;color:var(--text-secondary);">${mq.cv_f1 < 0.3 ? 'Profiles ≠ Causes' : 'Profile-Driven'}</div>
      <div class="kpi-sub">${mq.cv_f1 < 0.3 ? 'Correlation, not causation — see comment themes for actual drivers' : 'Profiles partially predict detractors'}</div>
    </div>
  </div>`;

  // SHAP Feature Importance bar chart — top 5 only
  const shapImp = (d.shap_importance || []).slice(0, 5);
  if (shapImp.length > 0) {
    html += `<div class="card">
      <div class="card-title">Top 5 Risk Profile Indicators</div>
      <div class="card-subtitle">These features correlate with detractor status but do not cause it. They describe who is most susceptible, not why they are unhappy.</div>
      <canvas id="chartShapImportance" height="180"></canvas>
    </div>`;
  }

  // Summary callout — promoters dominate all segments
  html += `<div class="card" style="border-left:4px solid var(--green);margin-bottom:24px;">
    <div class="card-title">Key Evidence: Correlation \u2260 Causation</div>
    <p style="font-size:14px;color:var(--text-secondary);line-height:1.6;">
      Across all profile segments below, <strong>promoters outnumber detractors by at least 3:1</strong> \u2014 even in the "highest risk" buckets.
      The maximum detractor rate shift between the lowest and highest risk groups is only 4-7 percentage points.
      If these profiles truly <em>caused</em> detraction, we would expect detractors to dominate the high-risk segments. They don't.
      This confirms these are <strong>susceptibility indicators</strong>, not root causes.
    </p>
  </div>`;

  // Top 5 feature donut charts with narratives
  const shapDetails = (d.shap_details || []).slice(0, 5);
  if (shapDetails.length > 0) {
    html += `<div class="card">
      <div class="card-title">Profile Risk Indicators vs Overall Baseline</div>
      <div class="card-subtitle">Each donut shows the highest-risk bucket for that feature. Compare to the overall baseline \u2014 they barely differ.</div>
      <div style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center;align-items:flex-start;margin:20px 0;">
        <div style="text-align:center;width:140px;">
          <canvas id="donut-baseline" width="120" height="120"></canvas>
          <div style="font-weight:700;font-size:13px;margin-top:8px;">Overall Baseline</div>
          <div style="font-size:11px;color:var(--text-muted);">All ${fmtNum(mq.n_samples)} responses</div>
        </div>`;

    shapDetails.forEach((detail, i) => {
      const impacts = detail.value_impacts || [];
      let worst = impacts[0] || {};
      impacts.forEach(v => {
        const curDPct = v.count > 0 ? (v.n_detractor||0)/v.count : 0;
        const worstDPct = worst.count > 0 ? (worst.n_detractor||0)/worst.count : 0;
        if (curDPct > worstDPct) worst = v;
      });
      html += `
        <div style="text-align:center;width:140px;">
          <canvas id="donut-feat-${i}" width="120" height="120"></canvas>
          <div style="font-weight:700;font-size:13px;margin-top:8px;">${detail.feature}</div>
          <div style="font-size:11px;color:var(--text-muted);">${worst.value} (n=${fmtNum(worst.count||0)})</div>
        </div>`;
    });

    html += `</div></div>`;

    shapDetails.forEach((detail, i) => {
      const featNarrText = getFeatureNarrative(detail.feature);
      const impacts = detail.value_impacts || [];
      let worst = impacts[0] || {};
      impacts.forEach(v => {
        const curDPct = v.count > 0 ? (v.n_detractor||0)/v.count : 0;
        const worstDPct = worst.count > 0 ? (worst.n_detractor||0)/worst.count : 0;
        if (curDPct > worstDPct) worst = v;
      });
      const wDPct = worst.count > 0 ? ((worst.n_detractor||0)/worst.count*100).toFixed(0) : '0';
      const wPPct = worst.count > 0 ? ((worst.n_promoter||0)/worst.count*100).toFixed(0) : '0';

      html += `<div class="card" style="padding:16px 20px;">
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <div style="font-size:20px;font-weight:700;color:var(--pw-purple);min-width:28px;">#${i+1}</div>
          <div style="flex:1;">
            <div style="font-weight:700;font-size:15px;margin-bottom:4px;">${detail.feature}</div>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.5;margin:0 0 6px 0;">${featNarrText || ''}</p>
            <div style="font-size:12px;color:var(--text-muted);">
              Highest risk group: <strong>${worst.value}</strong> \u2014 ${wPPct}% promoters, ${wDPct}% detractors (${fmtNum(worst.count||0)} customers)
            </div>
          </div>
        </div>
      </div>`;
    });
  }

  // Methodology note — NPS Source
  html += `<div class="card" style="border-left:4px solid var(--amber);margin-top:24px;">
    <div class="card-title">⚠ Methodology Note: Survey Channel Bias</div>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:8px;">
      NPS Source was removed from the model because it dominated all other features. PostHog (in-app) surveys show <strong>9.6% detractor rate</strong> (n=1,027) 
      while Iterable (email) surveys show <strong>29.5% detractor rate</strong> (n=424) — a 3x difference.
    </p>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:8px;">
      This likely reflects <strong>survey timing and self-selection bias</strong>, not a true driver of dissatisfaction. 
      Email surveys may arrive alongside invoices or settlement statements, catching respondents at a moment of fee awareness.
    </p>
    <p style="font-size:13px;color:var(--amber);font-weight:600;">
      ⟶ Investigate: When does the Iterable NPS email fire relative to invoice/settlement delivery?
    </p>
  </div>`;

  // Engagement Paradox removed — finding incorporated into synthesis

  document.getElementById('sec-diagnostic').innerHTML = html;

  // ---- CHARTS ----

  // SHAP Importance horizontal bar chart — top 5
  if (shapImp.length > 0) {
    const top5 = shapImp.slice().reverse();
    new Chart(document.getElementById('chartShapImportance'), {
      type: 'bar',
      data: {
        labels: top5.map(f => f.feature),
        datasets: [{
          label: 'Mean |SHAP|',
          data: top5.map(f => f.mean_abs_shap),
          backgroundColor: top5.map((f, i) => {
            const idx = top5.length - 1 - i;
            return idx < 2 ? '#7C3AED' : idx < 4 ? '#A78BFA' : '#D8B4FE';
          }),
          borderRadius: 4,
        }]
      },
      options: {
        indexAxis: 'y',
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => 'Impact: ' + ctx.parsed.x.toFixed(4) } }
        },
        scales: {
          x: { title: { display: true, text: 'Mean |SHAP Value|' }, beginAtZero: true },
          y: { ticks: { font: { weight: '600' } } }
        }
      }
    });
  }

  // Donut charts for baseline + features
  const shapDetailsForCharts = (d.shap_details || []).slice(0, 5);
  const totalDet = mq.n_detractors;
  const totalPass = Math.round(mq.n_samples * ((d.engagement_paradox||[]).length > 0 ? 0.167 : 0.167));
  const totalProm = mq.n_samples - totalDet - totalPass;
  const donutOpts = (p, pa, det) => ({
    type: 'doughnut',
    data: {
      labels: ['Promoters','Passives','Detractors'],
      datasets: [{ data: [p, pa, det], backgroundColor: ['#22C55E','#F59E0B','#DC2626'], borderWidth: 0 }]
    },
    options: {
      cutout: '55%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ctx.label + ': ' + ctx.parsed + ' (' + Math.round(ctx.parsed/(p+pa+det)*100) + '%)' } }
      }
    }
  });
  // Baseline donut
  const baseEl = document.getElementById('donut-baseline');
  if (baseEl) new Chart(baseEl, donutOpts(totalProm, totalPass, totalDet));
  // Per-feature donuts (worst bucket)
  shapDetailsForCharts.forEach((detail, i) => {
    const impacts = detail.value_impacts || [];
    let worst = impacts[0] || {};
    impacts.forEach(v => {
      const curDPct = v.count > 0 ? (v.n_detractor||0)/v.count : 0;
      const worstDPct = worst.count > 0 ? (worst.n_detractor||0)/worst.count : 0;
      if (curDPct > worstDPct) worst = v;
    });
    const el = document.getElementById('donut-feat-' + i);
    if (el) new Chart(el, donutOpts(worst.n_promoter||0, worst.n_passive||0, worst.n_detractor||0));
  });
}

      <div class="method-item"><span class="method-label">Generated</span><div class="method-text">${new Date(DATA.metadata.generated_at).toLocaleString()}</div></div>
      <div class="method-item"><span class="method-label">Version</span><div class="method-text">${DATA.metadata.pipeline_version}</div></div>
    </div>`;
}


// ============================================================
// RENDER ALL + NAV
// ============================================================
function renderAll() {
  renderDescriptive();
  renderDiagnostic();
  renderPredictive();
  renderPrescriptive();
  renderDrilldown();
  renderMethodology();
}

// Nav switching
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('sec-' + this.dataset.section).classList.add('active');
  });
});

// Load
document.addEventListener('DOMContentLoaded', loadData);
</script>
